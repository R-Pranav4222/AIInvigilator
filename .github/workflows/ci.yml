# CI/CD Pipeline for AIInvigilator
# Runs on every push to main and on PRs
# Steps: Lint → Test → Build Docker image

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ─── Job 1: Lint & Test ─────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      # Redis for channel layer + Celery broker during tests
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # MySQL for database tests
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: aiinvigilator_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      SECRET_KEY: "test-secret-key-not-for-production"
      DEBUG: "True"
      DB_NAME: aiinvigilator_test
      DB_USER: root
      DB_PASS: testpassword
      DB_HOST: "127.0.0.1"
      DB_PORT: "3306"
      REDIS_URL: "redis://127.0.0.1:6379/0"
      CELERY_BROKER_URL: "redis://127.0.0.1:6379/1"
      CELERY_RESULT_BACKEND: "redis://127.0.0.1:6379/2"
      CELERY_TASK_ALWAYS_EAGER: "True"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y default-libmysqlclient-dev pkg-config gcc g++ ffmpeg

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django pytest-asyncio

      - name: Wait for MySQL
        run: |
          for i in $(seq 1 30); do
            mysqladmin ping -h 127.0.0.1 -u root -ptestpassword --silent && break
            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done

      - name: Run Django system check
        run: python manage.py check --deploy 2>&1 || true

      - name: Run migrations
        run: python manage.py migrate --run-syncdb

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ─── Job 2: Build Docker Image ─────────────────────────────────
  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test  # Only build if tests pass
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false  # Set to true + add registry login for auto-deploy
          tags: aiinvigilator:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Optional: Push to Docker Hub / GitHub Container Registry ──
      # Uncomment and add secrets DOCKER_USERNAME + DOCKER_PASSWORD in repo settings
      #
      # - name: Login to Docker Hub
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKER_USERNAME }}
      #     password: ${{ secrets.DOCKER_PASSWORD }}
      #
      # - name: Push to Docker Hub
      #   uses: docker/build-push-action@v5
      #   with:
      #     context: .
      #     push: true
      #     tags: ${{ secrets.DOCKER_USERNAME }}/aiinvigilator:latest
