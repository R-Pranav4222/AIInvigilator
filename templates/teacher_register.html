{% include 'header.html' %}
{% load static %}

<style>
  .register-container { max-width: 650px; margin: 100px auto 60px; padding: 0 1rem; }
  .register-card {
    background: var(--bg-glass) !important;
    backdrop-filter: blur(20px);
    border: 1px solid var(--border-default) !important;
    border-radius: var(--radius-xl) !important;
    padding: 40px 30px;
    position: relative;
    overflow: hidden;
  }
  .register-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--accent-gradient);
  }
  .register-title {
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--text-primary);
    margin-bottom: 0.5rem;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .register-subtitle {
    text-align: center;
    color: var(--text-muted);
    font-size: 0.85rem;
    margin-bottom: 2rem;
  }
  .form-control-file {
    cursor: pointer;
    border-radius: var(--radius-sm);
    color: var(--text-secondary);
    font-size: 0.85rem;
  }
</style>

<!-- Registration Section Start -->
<div class="container register-container">
  <div class="card register-card">
    <h2 class="register-title">Teacher Registration</h2>
    <p class="register-subtitle">Create a new invigilator account</p>
    <form action="{% url 'teacher_register' %}" method="POST" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="form-row">
        <div class="form-group col-md-6">
          <label class="form-label-dark" for="first_name">First Name</label>
          <input type="text" name="first_name" class="form-control" id="first_name" placeholder="John" required>
        </div>
        <div class="form-group col-md-6">
          <label class="form-label-dark" for="last_name">Last Name</label>
          <input type="text" name="last_name" class="form-control" id="last_name" placeholder="Doe" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label-dark" for="email">Email ID</label>
        <input type="email" name="email" class="form-control" id="email" placeholder="john.doe@example.com" required>
      </div>

      <div class="form-group">
        <label class="form-label-dark" for="username">Username</label>
        <input type="text" name="username" class="form-control" id="username" placeholder="Enter username" required>
      </div>

      <div class="form-group">
        <label class="form-label-dark" for="password">Password</label>
        <input type="password" name="password" class="form-control" id="password" placeholder="Enter password" required>
      </div>

      <div class="form-group">
        <label class="form-label-dark" for="phone">Phone Number</label>
        <input type="text" name="phone" class="form-control" id="phone" placeholder="+1 123 456 7890" required>
      </div>

      <div class="form-group">
        <label class="form-label-dark" for="profile_picture">Profile Picture</label>
        <input type="file" name="profile_picture" class="form-control-file" id="profile_picture">
        <small class="form-text" style="color:var(--text-muted);">Optional. Upload a profile image.</small>
      </div>

      <button type="submit" class="btn btn-accent btn-block btn-lg mt-4">
        <i class="fas fa-user-plus" style="margin-right:6px;"></i> Register
      </button>
    </form>
  </div>
</div>
<!-- Registration Section End -->

{% include 'footer.html' %}
