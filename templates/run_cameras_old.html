{% include 'header.html' %}
{% load static %}

<style>
  .script-container { margin-top: 100px; margin-bottom: 60px; }
  .script-card {
    background: var(--bg-glass);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-xl);
    padding: 40px 30px;
    transition: var(--transition-base);
    position: relative;
    overflow: hidden;
  }
  .script-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--accent-gradient);
  }
  .script-card:hover { transform: translateY(-3px); box-shadow: var(--glow-subtle); }
  .script-heading {
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--text-primary);
    text-align: center;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .script-heading::after {
    content: "";
    display: block;
    width: 50px;
    height: 3px;
    background: var(--success);
    margin: 12px auto 0;
    border-radius: 2px;
  }
  .description {
    font-size: 0.9rem;
    color: var(--text-muted);
    margin: 20px 0 25px;
    text-align: center;
    line-height: 1.6;
  }
  .run-btn {
    font-size: 1rem;
    font-weight: 600;
    padding: 14px;
    border-radius: var(--radius-sm);
    transition: var(--transition-base);
    width: 100%;
    margin-bottom: 10px;
  }
  .btn-success {
    background: var(--success) !important;
    border: none !important;
    color: #fff !important;
  }
  .btn-success:hover { background: #0ea572 !important; box-shadow: 0 4px 15px rgba(16,185,129,0.3); }
  .btn-danger {
    background: var(--danger) !important;
    border: none !important;
    color: #fff !important;
  }
  .btn-danger:hover { background: #dc2626 !important; box-shadow: 0 4px 15px rgba(239,68,68,0.3); }
  #loading { display: none; text-align: center; margin-top: 20px; }
  #loading p { color: var(--text-muted); font-size: 0.9rem; margin-top: 8px; }
  #stop-button { display: none; margin-bottom: 10px; }
</style>

  <div class="container script-container">
    <div class="row justify-content-center">
      <div class="col-md-8">
        <div class="script-card">
          <h2 class="script-heading">Run Cameras</h2>
          <p class="description">
            Trigger all 3 monitoring scripts on the connected client laptops using the buttons below.
          </p>
          <button id="run-button" class="btn btn-success run-btn" type="button">
            🚀 Run Camera Scripts on All Clients
          </button>
          <button id="stop-button" class="btn btn-danger run-btn" type="button">
            ⏹ Stop Running Camera Scripts
          </button>
          <div id="loading">
            <img src="{% static 'gif/loading-spinner.gif' %}" alt="Loading..." style="width:50px; height:50px;">
            <p id="proc">Processing...</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
  $(document).ready(function(){
    // When the Run button is clicked
    $("#run-button").click(function(e){
      $("#proc").html('Processing...');  
      e.preventDefault();
      // Show loading and stop button; hide run button
      $("#loading").show();
      $("#stop-button").show();
      $("#run-button").hide();
      
      $.ajax({
        url: "{% url 'trigger_camera_scripts' %}",
        type: "POST",
        data: {
          csrfmiddlewaretoken: '{{ csrf_token }}'
        },
        success: function(response){
          console.log("Run scripts started:", response);
        },
        error: function(xhr, errmsg, err){
          console.log("Error running scripts:", errmsg);
        }
      });
    });
    
    // When the Stop button is clicked, also show a loading icon during processing
    $("#stop-button").click(function(e){
      e.preventDefault();
      $("#loading").show();  // Show loading icon when stop is clicked
      $("#proc").html('Stopping...');  
      
      $.ajax({
        url: "{% url 'stop_camera_scripts' %}",
        type: "POST",
        data: {
          csrfmiddlewaretoken: '{{ csrf_token }}'
        },
        success: function(response){
          console.log("Scripts stopped:", response);
          // Hide loading and stop button; show run button again
          $("#loading").hide();
          $("#stop-button").hide();
          $("#run-button").show();
        },
        error: function(xhr, errmsg, err){
          console.log("Error stopping scripts:", errmsg);
        }
      });
    });
  });
  </script>
