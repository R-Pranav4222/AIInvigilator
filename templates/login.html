{% include 'header.html' %}
{% load static %}

<!-- Login Page -->
<div class="login-wrapper">
  <div class="login-bg-mesh"></div>
  <div class="login-card-dark glass-card reveal-scale">
    <div class="login-header">
      <div class="login-logo">
        <i class="fas fa-shield-halved"></i>
      </div>
      <h3 class="login-title">Welcome Back</h3>
      <p class="login-subtitle">Sign in to your dashboard</p>
    </div>

    <form action="{% url 'addlogin' %}" method="POST" autocomplete="off">
      {% csrf_token %}
      <!-- Username -->
      <div class="form-group mb-4">
        <label for="username" class="form-label-dark">Username</label>
        <div class="input-icon-wrapper">
          <i class="fas fa-user input-icon"></i>
          <input type="text" class="form-control form-control-dark" name="username" id="username"
            placeholder="Enter your username" required autofocus>
        </div>
      </div>
      <!-- Password -->
      <div class="form-group mb-4">
        <label for="password" class="form-label-dark">Password</label>
        <div class="input-icon-wrapper">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" class="form-control form-control-dark" name="password" id="password"
            placeholder="Enter your password" required>
          <button type="button" class="password-toggle" onclick="togglePassword()">
            <i class="fas fa-eye" id="toggleIcon"></i>
          </button>
        </div>
      </div>

      {% if error %}
      <div class="alert alert-danger-dark mb-3">
        <i class="fas fa-exclamation-circle" style="margin-right:6px;"></i> {{ error }}
      </div>
      {% endif %}

      <!-- Login Button -->
      <button class="btn btn-accent btn-block btn-lg mt-3" type="submit">
        <i class="fas fa-right-to-bracket" style="margin-right:6px;"></i> Sign In
      </button>

      <!-- Register Link -->
      <div class="text-center mt-4">
        <p class="login-register-text">
          Don't have an account? 
          <a href="{% url 'teacher_register' %}" class="login-register-link">Create one</a>
        </p>
      </div>
    </form>
  </div>
</div>

<script>
function togglePassword() {
  var pwd = document.getElementById('password');
  var icon = document.getElementById('toggleIcon');
  if (pwd.type === 'password') {
    pwd.type = 'text';
    icon.classList.remove('fa-eye');
    icon.classList.add('fa-eye-slash');
  } else {
    pwd.type = 'password';
    icon.classList.remove('fa-eye-slash');
    icon.classList.add('fa-eye');
  }
}
</script>
