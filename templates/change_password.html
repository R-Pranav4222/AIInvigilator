{% include "header.html" %}
{% load static %}
{% block content %}

<style>
  .change-password-container { max-width: 500px; margin: 100px auto 60px; padding: 0 15px; }
  .change-password-card {
    background: var(--bg-glass);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-xl);
    padding: 40px;
    transition: var(--transition-base);
    position: relative;
    overflow: hidden;
  }
  .change-password-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--accent-gradient);
  }
  .change-password-card:hover { transform: translateY(-3px); box-shadow: var(--glow-subtle); }
  .change-password-heading {
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--text-primary);
    text-align: center;
    border-bottom: 2px solid transparent;
    border-image: var(--accent-gradient) 1;
    padding-bottom: 15px;
    margin-bottom: 30px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .btn-submit {
    background: var(--accent-gradient) !important;
    border: none !important;
    color: var(--text-inverse) !important;
    font-weight: 600;
    width: 100%;
    padding: 12px;
    border-radius: var(--radius-sm);
    transition: var(--transition-base);
  }
  .btn-submit:hover { box-shadow: 0 4px 15px rgba(0,212,255,0.3); transform: translateY(-1px); }
  .btn-cancel {
    background: var(--bg-surface) !important;
    border: 1px solid var(--border-default) !important;
    color: var(--text-secondary) !important;
    font-weight: 600;
    width: 100%;
    padding: 12px;
    border-radius: var(--radius-sm);
    margin-top: 10px;
    transition: var(--transition-base);
  }
  .btn-cancel:hover { border-color: var(--border-hover) !important; color: var(--text-primary) !important; }
</style>

<div class="container change-password-container">
  <div class="change-password-card">
    <h2 class="change-password-heading">Change Password</h2>

    <!-- Display Success/Error Notifications -->
    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="close" data-dismiss="alert" aria-label="Close">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
      {% endfor %}
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn btn-submit mt-3">Update Password</button>
      <a href="{% url 'profile' %}" class="btn btn-cancel mt-3">Cancel</a>
    </form>
  </div>
</div>

{% endblock %}
